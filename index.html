<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Chấm công</title>

<link rel="stylesheet"
href="css/index.css">

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="images/logo.jpg">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="TTG">

<meta name="theme-color" content="#2E7D32">

</head>

<body>

<div class="container">

<div class="card">

<img src="images/logo.jpg"
class="logo">

<h2>TOÀN THỊNH GROUP</h2>

<p class="subtitle">

Hệ thống chấm công nhân viên

</p>

<p id="userInfo"></p>


</p>

<div class="box">

<label>

📌 Hình thức

</label>

<select id="type">

<option>Check In</option>

<option>Check Out</option>

</select>

</div>

<div class="gps-box">

<h4>

📍 Vị trí hiện tại

</h4>

<p id="gps">

Chưa xác định

</p>

</div>

<div class="info-card">

<p>🏢 Địa điểm</p>

<span id="siteName">

Chưa xác định

</span>

</div>

<div class="info-card">

<p>📏 Khoảng cách</p>

<span id="distance">

0 m

</span>

</div>

<button
class="check-btn"
onclick="getLocation()">

XÁC NHẬN CHẤM CÔNG

</button>

<button
class="logout-btn"
onclick="logout()">

🚪 Đăng xuất

</button>

</div>

</div>


<script src="js/common.js"></script>

<script src="js/attendance.js"></script>

<script>
if(

'serviceWorker' in navigator

){

navigator.serviceWorker.register(

'./sw.js'

);

}
</script>

</body>

</html>
