<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Chấm công</title>

<link rel="stylesheet"
href="css/index.css">

</head>

<body>

<div class="container">

<div class="card">

<img src="images/logo.jpg"
class="logo">

<h2>TOÀN THỊNH GROUP</h2>

<p class="subtitle">

Hệ thống chấm công nhân viên

</p>

<p id="userInfo"></p>

<div class="box">

<label>

📌 Hình thức

</label>

<select id="type">

<option>Check In</option>

<option>Check Out</option>

</select>

</div>

<div class="gps-box">

<h4>

📍 Vị trí hiện tại

</h4>

<p id="gps">

Chưa xác định

</p>

</div>

<button
class="check-btn"
onclick="getLocation()">

XÁC NHẬN CHẤM CÔNG

</button>

<button
class="logout-btn"
onclick="logout()">

🚪 Đăng xuất

</button>

</div>

</div>

<script src="js/common.js"></script>

<script src="js/attendance.js"></script>

</body>

</html>
